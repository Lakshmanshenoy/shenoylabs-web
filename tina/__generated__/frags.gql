}

fragment HomepageFeaturedProjectsParts on HomepageFeaturedProjects {
  __typename
  projects {
    __typename
    slug
    title
    problem
    whyItMatters
    tags
    thumbnail
    thumbnailAlt
    status
    statusColor
  }
}

fragment HomepageSupportCopyParts on HomepageSupportCopy {
