fragment ArticleParts on Article {
  __typename
  title
  excerpt
  date
  category
  primaryCategory
  tags
  author
  depthLevel
  coverImage
  coverAlt
  body
}

fragment ProjectParts on Project {
  __typename
  title
  description
  date
  primaryCategory
  tags
  depthLevel
  status
  githubUrl
  liveUrl
  coverImage
  coverAlt
  body
}

fragment PageParts on Page {
  __typename
  title
  description
  body
}

fragment HomepageHeroParts on HomepageHero {
  __typename
  headline
  identityLine
  subheadline
  primaryCta {
    __typename
    label
    href
  }
  secondaryCta {
    __typename
    label
    href
  }
  statusLine
  tagline
  visualImage
  visualAlt
  whatIDo {
    __typename
    icon
    label
  }
