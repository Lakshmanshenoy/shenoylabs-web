name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack + prepare pnpm
        run: corepack enable && corepack prepare pnpm@8 --activate

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (capture report)
        run: pnpm exec tsc --noEmit

      - name: Run ESLint (fail on error)
        run: pnpm exec eslint --ext .js,.jsx,.ts,.tsx .

      - name: Run tests
        run: pnpm test -- --run
        env:
          CI: true

  reports:
    name: Generate and upload check reports
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack + prepare pnpm
        run: corepack enable && corepack prepare pnpm@8 --activate

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (capture report)
        run: pnpm exec tsc --noEmit 2>&1 | tee tsc-report.txt || true
        continue-on-error: true

      - name: Upload TypeScript report
        uses: actions/upload-artifact@v4
        with:
          name: tsc-report
          path: tsc-report.txt

      - name: Run ESLint (JSON report)
        run: pnpm exec eslint --ext .js,.jsx,.ts,.tsx . -f json -o eslint-report.json || true
        continue-on-error: true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
