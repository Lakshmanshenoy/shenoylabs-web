name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack + prepare pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Use committed pnpm allowlist
        run: |
          echo "Using committed .pnpm/allow-builds.json; no runtime approvals"

      - name: Debug pnpm and allowlist
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          echo "node: $(node -v)"
          echo "pnpm: $(pnpm -v || true)"
          echo "workspace file:"; sed -n '1,200p' pnpm-workspace.yaml || true
          echo "allowlist exists:"; if [ -f .pnpm/allow-builds.json ]; then echo yes; else echo no; fi
          echo "allowlist content:"; sed -n '1,200p' .pnpm/allow-builds.json || true
          echo "pnpm allowBuilds config:"; pnpm config get --location=project --json allowBuilds || true
          echo "pnpm onlyBuiltDependenciesFile config:"; pnpm config get --location=project --json onlyBuiltDependenciesFile || true

      - name: Apply pnpm allowlist config
        run: |
          # Ensure the project pnpm config explicitly uses the committed allowlist
          pnpm config set --location=project onlyBuiltDependenciesFile .pnpm/allow-builds.json
          pnpm config set --location=project allowBuilds "$(cat .pnpm/allow-builds.json)"

      - name: Assert pnpm allowlist config
        run: |
          # Fail early if allowlist file is missing or project config isn't set
          if [ ! -f .pnpm/allow-builds.json ]; then
            echo ".pnpm/allow-builds.json not found" >&2
            ls -la .pnpm || true
            exit 1
          fi
          onlyBuilt=$(pnpm config get --location=project --json onlyBuiltDependenciesFile || echo null)
          if [ "$onlyBuilt" != "\".pnpm/allow-builds.json\"" ] && [ "$onlyBuilt" != ".pnpm/allow-builds.json" ]; then
            echo "pnpm onlyBuiltDependenciesFile is not set to .pnpm/allow-builds.json (value: $onlyBuilt)" >&2
            pnpm config list --location=project || true
            exit 1
          fi
          echo "pnpm allowlist present and project config set."


      - name: Install dependencies
        run: npx pnpm@10 install --frozen-lockfile

      - name: Typecheck (capture report)
        run: npx pnpm@10 exec tsc --noEmit

      - name: Run ESLint (fail on error)
        run: npx pnpm@10 exec eslint --ext .js,.jsx,.ts,.tsx .

      - name: Run tests
        run: npx pnpm@10 test -- --run
        env:
          CI: true

  reports:
    name: Generate and upload check reports
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack + prepare pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Use committed pnpm allowlist
        run: |
          echo "Using committed .pnpm/allow-builds.json; no runtime approvals"


      - name: Install dependencies
        run: npx pnpm@10 install --frozen-lockfile

      - name: Typecheck (capture report)
        run: npx pnpm@10 exec tsc --noEmit 2>&1 | tee tsc-report.txt || true
        continue-on-error: true

      - name: Upload TypeScript report
        uses: actions/upload-artifact@v7
        with:
          name: tsc-report
          path: tsc-report.txt

      - name: Run ESLint (JSON report)
        run: npx pnpm@10 exec eslint --ext .js,.jsx,.ts,.tsx . -f json -o eslint-report.json || true
        continue-on-error: true

      - name: Upload ESLint report
        uses: actions/upload-artifact@v7
        with:
          name: eslint-report
          path: eslint-report.json
