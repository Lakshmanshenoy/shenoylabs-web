name: Playwright tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10'

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        id: install_deps
        run: |
          start=$(date +%s)
          npx pnpm@10 install --frozen-lockfile
          end=$(date +%s)
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        id: install_browsers
        run: |
          start=$(date +%s)
          npx playwright install chromium
          end=$(date +%s)
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        id: run_tests
        run: |
          start=$(date +%s)
          npx playwright test --project=chromium --reporter=html
          end=$(date +%s)
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Timing summary
        if: always()
        run: |
          deps="${{ steps.install_deps.outputs.seconds || 'n/a' }}"
          browsers="${{ steps.install_browsers.outputs.seconds || 'n/a' }}"
          tests="${{ steps.run_tests.outputs.seconds || 'n/a' }}"
          {
            echo "## Playwright timing summary"
            echo ""
            echo "- Install dependencies: ${deps}s"
            echo "- Install browsers: ${browsers}s"
            echo "- Run tests: ${tests}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
