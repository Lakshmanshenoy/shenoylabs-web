name: "Scheduled Purge Consent"

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable pnpm@10
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate || true

      - name: Install dependencies
        run: npx pnpm@10 install --frozen-lockfile

      - name: Run purge script
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          CONSENT_ADMIN_KEY: ${{ secrets.CONSENT_ADMIN_KEY }}
        run: npx pnpm@10 run purge:consent
