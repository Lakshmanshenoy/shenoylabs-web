# Workspace packages: include root and common monorepo globs so the repo
# can expand into a multi-package layout later without breaking CI.
packages:
  - '.'
  - 'packages/*'
  - 'apps/*'
  - 'modules/*'
  - 'services/*'

allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true

ignoredBuiltDependencies: []

onlyBuiltDependencies:
  - esbuild
  - msw
  - sharp
  - unrs-resolver
