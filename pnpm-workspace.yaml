# Workspace packages: include root and common monorepo globs so the repo
# can expand into a multi-package layout later without breaking CI.
packages:
  - '.'
  - 'packages/*'
  - 'apps/*'
  - 'modules/*'
  - 'services/*'
onlyBuiltDependenciesFile: .pnpm/allow-builds.json
strictDepBuilds: true
# `ignoredBuiltDependencies` is intentionally omitted ‚Äî use the
# committed allowlist `.pnpm/allow-builds.json` with
# `onlyBuiltDependenciesFile` + `strictDepBuilds` for auditable approvals.
