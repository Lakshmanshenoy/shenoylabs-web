<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Blueprint: Integrations & Environment Variables">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071228"/>
      <stop offset="100%" stop-color="#0b122b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Accent shapes -->
  <g opacity="0.12">
    <circle cx="980" cy="120" r="180" fill="url(#accent)" />
    <rect x="70" y="360" width="420" height="220" rx="18" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25" />
    <rect x="540" y="240" width="560" height="320" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  </g>

  <!-- Title block -->
  <g filter="url(#shadow)">
    <text x="80" y="180" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="44" font-weight="700" fill="#ffffff">Blueprint: Integrations</text>
    <text x="80" y="222" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="20" font-weight="600" fill="#cfeaf6">Environment variables • runbooks • failure modes</text>
  </g>

  <!-- Service tiles (decorative) -->
  <g transform="translate(80,300)" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="220" height="56" rx="10" fill="#0f1724" opacity="0.6" stroke="rgba(255,255,255,0.04)"/>
      <text x="70" y="36" fill="#e6f6fb" font-size="16">Upstash</text>
    </g>
    <g transform="translate(250,0)">
      <rect x="0" y="0" width="220" height="56" rx="10" fill="#0f1724" opacity="0.6" stroke="rgba(255,255,255,0.04)"/>
      <text x="72" y="36" fill="#e6f6fb" font-size="16">Turnstile</text>
    </g>
    <g transform="translate(500,0)">
      <rect x="0" y="0" width="220" height="56" rx="10" fill="#0f1724" opacity="0.6" stroke="rgba(255,255,255,0.04)"/>
      <text x="72" y="36" fill="#e6f6fb" font-size="16">Resend</text>
    </g>
  </g>

  <!-- Small caption -->
  <text x="80" y="560" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="13" fill="#9fcbd9">shenoylabs-web — Integrations & environment variables</text>

</svg>
