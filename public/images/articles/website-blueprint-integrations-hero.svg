<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Website Blueprint: Integrations &amp; Environment Variables</title>
  <desc id="desc">Hero artwork for website blueprint showing integrations and environment variables</desc>
  <rect width="100%" height="100%" fill="#0f172a" />
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0369a1" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="url(#g)" />
  <text x="120" y="200" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">Website Blueprint:</text>
  <text x="120" y="264" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600">Integrations &amp; Environment Variables</text>
  <g transform="translate(120,320)">
    <rect x="0" y="0" width="320" height="180" rx="12" fill="#ffffff" opacity="0.06" />
    <text x="20" y="40" fill="#e6fffb" font-family="Inter, Arial, sans-serif" font-size="18">Upstash · Resend · GitHub</text>
    <text x="20" y="72" fill="#e6fffb" font-family="Inter, Arial, sans-serif" font-size="14">Turnstile · Vercel · Next.js</text>
    <text x="20" y="104" fill="#e6fffb" font-family="Inter, Arial, sans-serif" font-size="12">Env vars, secrets, runbooks, and ops guidance</text>
  </g>
</svg>
