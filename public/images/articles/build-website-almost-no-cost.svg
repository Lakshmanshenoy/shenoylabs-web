  <title id="title">How to build a website with almost no cost</title>
  <desc id="desc">Hero artwork: simple laptop, coin, and minimalist layout indicating low cost website building</desc>
  <rect width="100%" height="100%" fill="#0f172a" />
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#06202a" />
  <g transform="translate(120,120)">
