<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="Simplified architecture flowchart">
	<style>
		.box { fill:#f8fafc; stroke:#94a3b8; stroke-width:1.5; rx:8; }
		.label { font:16px/1.2 'Inter', Arial, sans-serif; fill:#0f172a; font-weight:700; }
		.arrow { stroke:#ef4444; stroke-width:3; fill:none; marker-end:url(#arrow); }
	</style>
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
		</marker>
	</defs>

	<!-- Arrows behind boxes -->
	<path d="M 280 120 L 320 120" class="arrow"/>
	<path d="M 560 120 L 600 120" class="arrow"/>
	<path d="M 840 120 L 880 120" class="arrow"/>

	<!-- Boxes -->
	<rect x="40" y="60" width="240" height="120" class="box"/>
	<text x="160" y="120" class="label" text-anchor="middle" dominant-baseline="middle">Client</text>

	<rect x="320" y="60" width="240" height="120" class="box"/>
	<text x="440" y="120" class="label" text-anchor="middle" dominant-baseline="middle">Edge Middleware</text>

	<rect x="600" y="60" width="240" height="120" class="box"/>
	<text x="720" y="120" class="label" text-anchor="middle" dominant-baseline="middle">Next.js Server</text>

	<rect x="880" y="60" width="240" height="120" class="box"/>
	<text x="1000" y="120" class="label" text-anchor="middle" dominant-baseline="middle">External Services</text>

</svg>
