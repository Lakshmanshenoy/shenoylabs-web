<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-label="Integration flow for contact form">
	<style>
		.lane { fill:#fff; stroke:#cbd5e1; stroke-width:1; rx:6; }
		.title { font: 16px/1.2 'Inter', Arial, sans-serif; fill:#ef4444; font-weight:700; }
		.text { font:14px 'Inter', Arial, sans-serif; fill:#0f172a; }
		.arrow { stroke:#ef4444; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
	</style>
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
		</marker>
	</defs>

	<!-- Flow arrows (drawn behind lanes so lanes sit above arrows) -->
	<path d="M 310 80 L 360 80" class="arrow"/>
	<path d="M 540 120 L 720 120" class="arrow"/>
	<path d="M 540 160 L 720 160" class="arrow"/>
	<path d="M 540 200 L 720 200" class="arrow"/>
	<path d="M 540 240 L 720 240" class="arrow"/>

	<!-- Lanes -->
	<rect x="30" y="20" width="280" height="160" class="lane"/>
	<text x="42" y="44" class="title">Client</text>
	<text x="42" y="64" class="text">Contact form + Turnstile</text>
	<text x="42" y="84" class="text">file: src/components/contact/contact-form.tsx</text>

	<rect x="360" y="20" width="320" height="260" class="lane"/>
	<text x="372" y="44" class="title">Server (Next.js)</text>
	<text x="372" y="66" class="text">Contact API</text>
	<text x="372" y="86" class="text">file: src/app/api/contact/route.ts</text>

	<rect x="720" y="20" width="240" height="300" class="lane"/>
	<text x="732" y="44" class="title">External Services</text>
	<text x="732" y="66" class="text">Turnstile, Upstash, Resend, GitHub</text>

	<!-- Flow labels (rendered on top of lanes for readability) -->
	<text x="335" y="72" class="text">1. POST /api/contact (token)</text>
	<text x="700" y="112" class="text">2. Verify Turnstile (TURNSTILE_SECRET_KEY)</text>
	<text x="630" y="152" class="text">3. Rate-limit check (Upstash: KV_REST_API_TOKEN)</text>
	<text x="700" y="192" class="text">4. Send email (Resend: RESEND_API_KEY)</text>
	<text x="630" y="232" class="text">5. Optional: create PR (GitHub: GITHUB_TOKEN)</text>

	<!-- Notes (moved inside the Client lane for visibility) -->
	<text x="42" y="140" class="text">Sanitize inputs, verify tokens server-side, and guard admin endpoints.</text>
</svg>
